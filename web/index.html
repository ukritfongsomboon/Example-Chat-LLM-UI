<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Theme variables ────────────────────────────────────────────────── */
    :root {
      --bg-page: #f0f2f5;
      --bg-card: #ffffff;
      --bg-header: #ffffff;
      --bg-input: #ffffff;
      --bg-bubble-ai: #f1f3f5;
      --bg-thinking: #faf7ff;
      --bg-thinking-h: #f5f0ff;
      --border: #e9ecef;
      --border-input: #dee2e6;
      --text-primary: #1a1a2e;
      --text-muted: #6c757d;
      --text-faint: #adb5bd;
      --shadow: rgba(0, 0, 0, 0.10);
      --code-bg: rgba(0, 0, 0, 0.07);
      --scrollbar: #dee2e6;
    }

    [data-theme="dark"] {
      --bg-page: #0f1117;
      --bg-card: #1a1d27;
      --bg-header: #1a1d27;
      --bg-input: #1a1d27;
      --bg-bubble-ai: #252836;
      --bg-thinking: #1e1a2e;
      --bg-thinking-h: #25203a;
      --border: #2e3147;
      --border-input: #2e3147;
      --text-primary: #e8eaf0;
      --text-muted: #8b8fa8;
      --text-faint: #555870;
      --shadow: rgba(0, 0, 0, 0.40);
      --code-bg: rgba(255, 255, 255, 0.07);
      --scrollbar: #2e3147;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-page);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .chat-container {
      width: 100%;
      max-width: 720px;
      height: 100vh;
      max-height: 860px;
      background: var(--bg-card);
      border-radius: 16px;
      box-shadow: 0 4px 24px var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.3s, box-shadow 0.3s;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .chat-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-header);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.3s, border-color 0.3s;
      flex-shrink: 0;
    }

    .chat-header .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
    }

    .chat-header .info {
      flex: 1;
    }

    .chat-header .info h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .chat-header .info span {
      font-size: 12px;
      color: var(--text-muted);
    }

    .theme-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s, transform 0.3s;
    }

    .theme-btn:hover {
      border-color: #667eea;
      color: #667eea;
      transform: rotate(20deg);
    }

    .thinking-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }

    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .toggle-switch input {
      display: none;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 20px;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-switch input:checked+.toggle-slider {
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .toggle-switch input:checked+.toggle-slider::before {
      transform: translateX(16px);
    }

    /* ── Messages ───────────────────────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      background: var(--bg-card);
      transition: background 0.3s;
    }

    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--scrollbar);
      border-radius: 4px;
    }

    .message {
      display: flex;
      gap: 8px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .msg-content {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .msg-time {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-faint);
      padding: 0 4px;
      align-self: flex-start;
    }

    .message.user .msg-time {
      align-self: flex-end;
    }

    .feedback-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      padding: 0 2px;
      opacity: 0.4;
      transition: opacity 0.2s, transform 0.15s;
      line-height: 1;
    }

    .feedback-btn:hover {
      opacity: 1;
      transform: scale(1.2);
    }

    .feedback-btn.active {
      opacity: 1;
    }

    .message .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      animation: bubbleIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes bubbleIn {
      from {
        opacity: 0;
        transform: scale(0.92) translateY(8px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--bg-bubble-ai);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      transition: background 0.3s, color 0.3s;
    }

    .message.assistant .bubble:empty {
      display: none;
    }

    /* Markdown */
    .bubble p {
      margin: 0 0 8px;
    }

    .bubble p:last-child {
      margin-bottom: 0;
    }

    .bubble h1,
    .bubble h2,
    .bubble h3 {
      margin: 10px 0 4px;
      font-weight: 600;
      line-height: 1.3;
    }

    .bubble h1 {
      font-size: 18px;
    }

    .bubble h2 {
      font-size: 16px;
    }

    .bubble h3 {
      font-size: 14px;
    }

    .bubble ul,
    .bubble ol {
      margin: 4px 0 8px;
      padding-left: 20px;
    }

    .bubble li {
      margin-bottom: 2px;
    }

    .bubble code {
      background: var(--code-bg);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
    }

    .bubble pre {
      background: #1e1e2e;
      border-radius: 8px;
      padding: 12px 14px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .bubble pre code {
      background: none;
      padding: 0;
      color: #cdd6f4;
      font-size: 12px;
    }

    .bubble blockquote {
      border-left: 3px solid #c9b8f0;
      margin: 6px 0;
      padding-left: 10px;
      color: var(--text-muted);
    }

    .bubble strong {
      font-weight: 600;
    }

    .bubble a {
      color: #667eea;
      text-decoration: none;
    }

    .bubble a:hover {
      text-decoration: underline;
    }

    .bubble table {
      border-collapse: collapse;
      width: 100%;
      margin: 8px 0;
      font-size: 13px;
    }

    .bubble th,
    .bubble td {
      border: 1px solid var(--border);
      padding: 6px 10px;
    }

    .bubble th {
      background: var(--bg-bubble-ai);
      font-weight: 600;
    }

    .bubble hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 8px 0;
    }

    .bubble.streaming::after {
      content: '▋';
      display: inline-block;
      color: #764ba2;
      animation: blink 0.8s step-end infinite;
      margin-left: 1px;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    .message .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      align-self: flex-end;
    }

    .message.user .msg-avatar {
      background: var(--border);
      color: var(--text-muted);
    }

    /* ── Thinking ────────────────────────────────────────────────────────── */
    .thinking-block {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      font-size: 13px;
      animation: slideDown 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-8px) scale(0.97)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .thinking-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 14px;
      background: var(--bg-thinking-h);
      cursor: pointer;
      color: #7c5cbf;
      font-weight: 500;
      user-select: none;
      transition: background 0.15s;
    }

    .thinking-header:hover {
      filter: brightness(0.95);
    }

    .thinking-header .chevron {
      margin-left: auto;
      transition: transform 0.25s;
      font-size: 10px;
      opacity: 0.6;
    }

    .thinking-header.open .chevron {
      transform: rotate(90deg);
    }

    .thinking-body {
      overflow: hidden;
      max-height: 0;
      padding: 0 14px;
      background: var(--bg-thinking);
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
      transition: max-height 0.35s ease, padding 0.25s ease;
    }

    .thinking-body.visible {
      max-height: 300px;
      padding: 10px 14px;
      overflow-y: auto;
    }

    .thinking-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #c9b8f0;
      border-top-color: #764ba2;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Confidence ─────────────────────────────────────────────────────── */
    .confidence-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 500;
      animation: fadeIn 0.3s ease;
    }

    .confidence-badge.high {
      background: #d4f7e7;
      color: #1a7a4a;
    }

    .confidence-badge.medium {
      background: #fff3cd;
      color: #856404;
    }

    .confidence-badge.low {
      background: #fde8e8;
      color: #b91c1c;
    }

    .confidence-bar {
      width: 28px;
      height: 3px;
      border-radius: 2px;
      background: rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .confidence-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .high .confidence-bar-fill {
      background: #22c55e;
    }

    .medium .confidence-bar-fill {
      background: #f59e0b;
    }

    .low .confidence-bar-fill {
      background: #ef4444;
    }

    /* ── Tool badge ─────────────────────────────────────────────────────── */
    .tool-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: #fff8e6;
      border: 1px solid #ffe49e;
      border-radius: 20px;
      font-size: 12px;
      color: #9a6700;
      animation: fadeIn 0.2s ease;
      align-self: flex-start;
    }

    .tool-badge .tool-spinner {
      width: 10px;
      height: 10px;
      border: 1.5px solid #f5c542;
      border-top-color: #9a6700;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Typing indicator ───────────────────────────────────────────────── */
    .typing-indicator .bubble {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 12px 16px;
    }

    .typing-indicator .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-faint);
      animation: bounce 1.2s infinite;
    }

    .typing-indicator .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0)
      }

      30% {
        transform: translateY(-6px)
      }
    }

    /* ── Input area ─────────────────────────────────────────────────────── */
    .input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg-card);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--border-input);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.5;
      background: var(--bg-input);
      color: var(--text-primary);
      transition: border-color 0.2s, background 0.3s, color 0.3s;
    }

    .input-area textarea::placeholder {
      color: var(--text-faint);
    }

    .input-area textarea:focus {
      border-color: #667eea;
    }

    .input-area button {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .input-area button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .input-area button svg {
      width: 18px;
      height: 18px;
    }

    .upload-btn,
    .mic-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1.5px solid var(--border-input);
      background: var(--bg-input);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .upload-btn svg,
    .mic-btn svg {
      width: 18px;
      height: 18px;
    }

    .upload-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .upload-btn.has-image {
      border-color: #667eea;
      color: #667eea;
      background: #f0f0ff;
    }

    .mic-btn:hover {
      border-color: #ef4444;
      color: #ef4444;
    }

    .mic-btn.recording {
      border-color: #ef4444;
      background: #fef2f2;
      color: #ef4444;
      animation: micPulse 1s ease-in-out infinite;
    }

    @keyframes micPulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3)
      }

      50% {
        box-shadow: 0 0 0 6px rgba(239, 68, 68, 0)
      }
    }

    /* ── Image preview ──────────────────────────────────────────────────── */
    .image-preview {
      position: relative;
      display: inline-block;
      animation: fadeIn 0.2s ease;
    }

    .image-preview img {
      height: 72px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      display: block;
      object-fit: cover;
    }

    .image-preview .remove-img {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ef4444;
      color: #fff;
      border: none;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bubble img.chat-img {
      max-width: 260px;
      max-height: 200px;
      border-radius: 10px;
      display: block;
      margin-bottom: 6px;
      object-fit: cover;
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="chat-container">

      <!-- ── Header ──────────────────────────────────────────────────────── -->
      <div class="chat-header">
        <div class="avatar">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M12 2l2 7.2L21 12l-7 2L12 22l-2-7.2L3 12l7-2z" />
          </svg>
        </div>
        <div class="info">
          <h2>ARIX</h2>
          <span>{{ modelLabel }}</span>
        </div>
        <label class="thinking-toggle">
          <span>Thinking</span>
          <div class="toggle-switch">
            <input type="checkbox" v-model="thinkingMode">
            <div class="toggle-slider"></div>
          </div>
        </label>
        <label class="thinking-toggle">
          <span>Confidence</span>
          <div class="toggle-switch">
            <input type="checkbox" v-model="confidenceMode">
            <div class="toggle-slider"></div>
          </div>
        </label>
        <label class="thinking-toggle">
          <span>Vision</span>
          <div class="toggle-switch">
            <input type="checkbox" v-model="visionMode" @change="onVisionToggle">
            <div class="toggle-slider"></div>
          </div>
        </label>
        <button class="theme-btn" @click="toggleTheme" :title="theme === 'dark' ? 'Light mode' : 'Dark mode'">
          {{ theme === 'dark' ? '☀️' : '🌙' }}
        </button>
      </div>

      <!-- ── Messages ────────────────────────────────────────────────────── -->
      <div class="messages" ref="messagesEl">
        <template v-for="msg in messages" :key="msg.id">

          <!-- Typing indicator -->
          <div v-if="msg.typing" class="message assistant typing-indicator">
            <div class="msg-avatar"><svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
                <path d="M12 2l2 7.2L21 12l-7 2L12 22l-2-7.2L3 12l7-2z" />
              </svg></div>
            <div class="bubble">
              <div class="dot"></div>
              <div class="dot"></div>
              <div class="dot"></div>
            </div>
          </div>

          <!-- User message -->
          <div v-else-if="msg.role === 'user'" class="message user">
            <div class="msg-avatar">U</div>
            <div class="msg-content">
              <div class="bubble">
                <img v-if="msg.image" :src="msg.image" class="chat-img">
                <span>{{ msg.text }}</span>
              </div>
              <div class="msg-time">{{ msg.time }}</div>
            </div>
          </div>

          <!-- Assistant message -->
          <div v-else class="message assistant">
            <div class="msg-avatar"><svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
                <path d="M12 2l2 7.2L21 12l-7 2L12 22l-2-7.2L3 12l7-2z" />
              </svg></div>
            <div class="msg-content">
              <!-- Thinking block -->
              <div v-if="msg.thinking" class="thinking-block">
                <div :class="['thinking-header', { open: msg.thinkingOpen }]"
                  @click="msg.thinkingOpen = !msg.thinkingOpen">
                  <span v-if="!msg.thinkingDone" class="thinking-spinner"></span>
                  <span v-else>💭</span>
                  <span>{{ msg.thinkingDone ? 'Reasoning' : 'Thinking...' }}</span>
                  <span class="chevron">▶</span>
                </div>
                <div :class="['thinking-body', { visible: msg.thinkingOpen }]">{{ msg.thinking }}</div>
              </div>
              <!-- Tool badges -->
              <div v-for="tool in msg.toolBadges" :key="tool" class="tool-badge">
                <span class="tool-spinner"></span> กำลังใช้ <strong>{{ tool }}</strong>
              </div>
              <!-- Bubble -->
              <div :class="['bubble', { streaming: msg.streaming }]" v-html="msg.html"></div>
              <!-- Time + feedback + confidence -->
              <div class="msg-time">
                {{ msg.time }}
                <button class="feedback-btn" :class="{ active: msg.liked === 'up' }"
                  @click="toggleFeedback(msg, 'up')">👍</button>
                <button class="feedback-btn" :class="{ active: msg.liked === 'down' }"
                  @click="toggleFeedback(msg, 'down')">👎</button>
                <span v-if="msg.confidence" :class="['confidence-badge', msg.confidence.level]">
                  <div class="confidence-bar">
                    <div class="confidence-bar-fill" :style="{ width: msg.confidence.pct + '%' }"></div>
                  </div>
                  {{ msg.confidence.label }} <strong>{{ msg.confidence.pct }}%</strong>
                </span>
              </div>
            </div>
          </div>

        </template>
      </div>

      <!-- ── Input area ───────────────────────────────────────────────────── -->
      <div class="input-area">
        <div v-if="pendingImage">
          <div class="image-preview">
            <img :src="pendingImage">
            <button class="remove-img" @click="clearImage">✕</button>
          </div>
        </div>
        <div class="input-row">
          <input type="file" ref="fileInputEl" accept="image/*" style="display:none" @change="onFileChange">
          <button v-if="speechSupported" class="mic-btn" :class="{ recording: isRecording }" @click="toggleMic"
            :title="isRecording ? 'กำลังฟัง... คลิกเพื่อหยุด' : 'Speech to text'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" y1="19" x2="12" y2="23" />
              <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
          </button>
          <button v-if="visionMode" class="upload-btn" :class="{ 'has-image': pendingImage }"
            @click="fileInputEl.click()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <circle cx="8.5" cy="8.5" r="1.5" />
              <polyline points="21 15 16 10 5 21" />
            </svg>
          </button>
          <textarea ref="inputEl" v-model="inputText" rows="1" placeholder="Type a message..."
            @keydown.enter.exact.prevent="sendMessage" @input="autoResize"></textarea>
          <button :disabled="sending" @click="sendMessage">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script>
    const { createApp, ref, reactive, computed, watch, nextTick, onMounted } = Vue;

    marked.setOptions({ breaks: true, gfm: true });

    createApp({
      setup() {
        // ── State ──────────────────────────────────────────────────────────────
        let msgId = 0;

        const messages = reactive([]);
        const inputText = ref('');
        const thinkingMode = ref(false);
        const confidenceMode = ref(false);
        const visionMode = ref(false);
        const theme = ref(localStorage.getItem('theme') || 'light');
        const sending = ref(false);
        const pendingImage = ref(null);
        const isRecording = ref(false);
        const speechSupported = ref(false);

        // template refs
        const messagesEl = ref(null);
        const inputEl = ref(null);
        const fileInputEl = ref(null);

        const modelLabel = computed(() => thinkingMode.value ? 'Thinking mode' : 'Standard mode');

        // ── Theme ──────────────────────────────────────────────────────────────
        watch(theme, (val) => {
          document.documentElement.setAttribute('data-theme', val === 'dark' ? 'dark' : '');
          localStorage.setItem('theme', val);
        }, { immediate: true });

        function toggleTheme() {
          theme.value = theme.value === 'dark' ? 'light' : 'dark';
        }

        // ── Helpers ────────────────────────────────────────────────────────────
        function nowTime() {
          return new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
        }

        function safeParse(md) {
          return DOMPurify.sanitize(marked.parse(md || ''));
        }

        function scrollBottom() {
          nextTick(() => {
            if (messagesEl.value) messagesEl.value.scrollTop = messagesEl.value.scrollHeight;
          });
        }

        function autoResize() {
          const el = inputEl.value;
          if (!el) return;
          el.style.height = 'auto';
          el.style.height = el.scrollHeight + 'px';
        }

        function toggleFeedback(msg, dir) {
          msg.liked = msg.liked === dir ? null : dir;
        }

        // ── Image ──────────────────────────────────────────────────────────────
        function onVisionToggle() {
          if (!visionMode.value) clearImage();
        }

        function clearImage() {
          pendingImage.value = null;
        }

        function onFileChange(e) {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => { pendingImage.value = ev.target.result; };
          reader.readAsDataURL(file);
          e.target.value = '';
        }

        // ── Confidence score ───────────────────────────────────────────────────
        function estimateConfidence(text, tokenCount) {
          const hedges = ['อาจ', 'น่าจะ', 'คิดว่า', 'ไม่แน่ใจ', 'probably', 'might', 'perhaps', 'i think', 'not sure', 'unclear', 'possibly', 'maybe'];
          const factual = ['คือ', 'ได้แก่', 'เท่ากับ', 'is', 'are', 'equals', 'defined as'];
          const lower = text.toLowerCase();
          const hedgeCount = hedges.filter(h => lower.includes(h)).length;
          const factualCount = factual.filter(f => lower.includes(f)).length;
          const lengthScore = Math.min(tokenCount / 30, 1);
          let score = 0.65 + (lengthScore * 0.2) + (factualCount * 0.03) - (hedgeCount * 0.08);
          return Math.max(0.1, Math.min(0.99, score));
        }

        function applyConfidence(msg) {
          const score = estimateConfidence(msg.rawContent, msg.tokenCount);
          const pct = Math.round(score * 100);
          const level = pct >= 75 ? 'high' : pct >= 45 ? 'medium' : 'low';
          const label = pct >= 75 ? '🟢' : pct >= 45 ? '🟡' : '🔴';
          msg.confidence = { pct: 0, level, label };
          setTimeout(() => { msg.confidence.pct = pct; }, 50);
        }

        // ── Speech to text ─────────────────────────────────────────────────────
        let recognition = null;
        let interimStart = 0;

        onMounted(() => {
          // Initial greeting
          messages.push({
            id: msgId++, role: 'assistant',
            html: safeParse('สวัสดีครับ Navigator — ผมคือ ARIX ระบบปัญญาประดิษฐ์จาก Project Nexus พร้อมรับคำสั่งแล้วครับ'),
            rawContent: '', tokenCount: 0,
            time: nowTime(), streaming: false,
            thinking: '', thinkingDone: false, thinkingOpen: false,
            toolBadges: [], liked: null, confidence: null,
          });

          const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
          if (!SR) return;

          speechSupported.value = true;
          recognition = new SR();
          recognition.lang = 'th-TH';
          recognition.interimResults = true;
          recognition.continuous = false;

          recognition.addEventListener('start', () => {
            isRecording.value = true;
            interimStart = inputText.value.length;
          });

          recognition.addEventListener('result', (e) => {
            let interim = '', final = '';
            for (const r of e.results) {
              if (r.isFinal) final += r[0].transcript;
              else interim += r[0].transcript;
            }
            inputText.value = inputText.value.slice(0, interimStart) + (final || interim);
            nextTick(autoResize);
          });

          recognition.addEventListener('end', () => {
            isRecording.value = false;
            nextTick(() => inputEl.value?.focus());
          });

          recognition.addEventListener('error', (e) => {
            isRecording.value = false;
            if (e.error !== 'aborted') console.warn('Speech error:', e.error);
          });
        });

        function toggleMic() {
          if (!recognition) return;
          isRecording.value ? recognition.stop() : recognition.start();
        }

        // ── Send message ───────────────────────────────────────────────────────
        async function sendMessage() {
          const text = inputText.value.trim();
          if (!text || sending.value) return;

          inputText.value = '';
          nextTick(autoResize);
          sending.value = true;

          const useThinking = thinkingMode.value;
          const useConfidence = confidenceMode.value;
          const imageToSend = pendingImage.value;
          clearImage();

          // User message
          messages.push({
            id: msgId++, role: 'user',
            text, image: imageToSend,
            time: nowTime(),
          });
          scrollBottom();

          // Typing indicator
          const typingMsg = reactive({ id: msgId++, typing: true });
          messages.push(typingMsg);
          scrollBottom();

          try {
            const res = await fetch('/api/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: text, thinking: useThinking, confidence: useConfidence, image: imageToSend || '' }),
            });

            if (!res.ok || !res.body) throw new Error('Server error');

            // Remove typing indicator, add assistant message
            const idx = messages.indexOf(typingMsg);
            if (idx !== -1) messages.splice(idx, 1);

            const assistantMsg = reactive({
              id: msgId++, role: 'assistant',
              html: '', rawContent: '', tokenCount: 0,
              time: nowTime(), streaming: true,
              thinking: '', thinkingDone: false, thinkingOpen: true,
              toolBadges: [], liked: null, confidence: null,
            });
            messages.push(assistantMsg);
            scrollBottom();

            // SSE stream
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '', lastEvent = '', isThinking = false;

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;

              buffer += decoder.decode(value, { stream: true });
              const lines = buffer.split('\n');
              buffer = lines.pop();

              for (const line of lines) {
                if (line.startsWith('event:')) {
                  lastEvent = line.slice(6).trim();
                  continue;
                }
                if (!line.startsWith('data:')) continue;
                const raw = line.slice(5).trim();

                if (lastEvent === 'tool_use') {
                  lastEvent = '';
                  try {
                    const { name } = JSON.parse(raw);
                    assistantMsg.toolBadges.push(name);
                    scrollBottom();
                  } catch (_) { }
                  continue;
                }

                if (lastEvent === 'error') {
                  lastEvent = '';
                  assistantMsg.html = 'Error from server.';
                  assistantMsg.streaming = false;
                  continue;
                }

                lastEvent = '';

                if (raw === '[DONE]') {
                  // Finalize thinking
                  if (assistantMsg.thinking) {
                    assistantMsg.thinkingDone = true;
                    assistantMsg.thinkingOpen = false;
                  }
                  assistantMsg.toolBadges = [];
                  assistantMsg.streaming = false;
                  assistantMsg.html = safeParse(assistantMsg.rawContent);
                  if (useConfidence && assistantMsg.tokenCount > 0) {
                    applyConfidence(assistantMsg);
                  }
                  break;
                }

                try {
                  const json = JSON.parse(raw);
                  const delta = json.choices?.[0]?.delta;
                  if (!delta) continue;

                  // Reasoning / thinking
                  const reasoning = delta.reasoning ?? delta.reasoning_content;
                  if (reasoning) {
                    assistantMsg.thinking += reasoning;
                    scrollBottom();
                    if (!isThinking) isThinking = true;
                  }

                  // Main content
                  const chunk = delta.content;
                  if (chunk) {
                    if (isThinking) {
                      assistantMsg.thinkingDone = true;
                      assistantMsg.thinkingOpen = false;
                      isThinking = false;
                    }
                    assistantMsg.rawContent += assistantMsg.rawContent === '' ? chunk.trimStart() : chunk;
                    assistantMsg.tokenCount++;
                    assistantMsg.html = safeParse(assistantMsg.rawContent);
                    scrollBottom();
                  }
                } catch (_) { }
              }
            }
          } catch (err) {
            const idx = messages.indexOf(typingMsg);
            if (idx !== -1) messages.splice(idx, 1);
            messages.push({
              id: msgId++, role: 'assistant',
              html: 'Error connecting to server.',
              rawContent: '', tokenCount: 0,
              time: nowTime(), streaming: false,
              thinking: '', thinkingDone: false, thinkingOpen: false,
              toolBadges: [], liked: null, confidence: null,
            });
          } finally {
            sending.value = false;
            nextTick(() => inputEl.value?.focus());
          }
        }

        return {
          messages, inputText, thinkingMode, confidenceMode, visionMode,
          theme, sending, pendingImage, isRecording, speechSupported,
          messagesEl, inputEl, fileInputEl,
          modelLabel,
          toggleTheme, sendMessage, autoResize,
          toggleFeedback, toggleMic,
          onVisionToggle, clearImage, onFileChange,
        };
      }
    }).mount('#app');
  </script>

  <script src="http://localhost:3000/script.js" api-key="YOUR-API-KEY"></script>
</body>
